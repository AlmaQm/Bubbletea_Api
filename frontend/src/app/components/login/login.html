<div style="padding: 20px; max-width: 400px; margin: 0 auto;">
  <h1>Login</h1>

  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    <div style="margin-bottom: 15px;">
      <label for="email">Email:</label>
      <input 
        type="email" 
        id="email" 
        formControlName="email" 
        style="width: 100%; padding: 8px; margin-top: 5px;"
      />
    </div>

    <div style="margin-bottom: 15px;">
      <label for="password">Password:</label>
      <input 
        type="password" 
        id="password" 
        formControlName="password" 
        style="width: 100%; padding: 8px; margin-top: 5px;"
      />
    </div>

    <button type="submit" [disabled]="loading" style="padding: 10px 20px; cursor: pointer;">
      {{ loading ? 'Cargando...' : 'Login' }}
    </button>
  </form>

  <div *ngIf="errorMessage" style="color: red; margin-top: 15px;">
    {{ errorMessage }}
  </div>

  <div style="margin-top: 20px;">
    <button (click)="navigateToRegister()" style="background: none; border: none; color: blue; text-decoration: underline; cursor: pointer;">
      ¿No tienes cuenta? Regístrate
    </button>
  </div>

  <div style="margin-top: 10px;">
    <button (click)="navigateToForgotPassword()" style="background: none; border: none; color: blue; text-decoration: underline; cursor: pointer;">
      ¿Olvidaste tu contraseña?
    </button>
  </div>
</div>
