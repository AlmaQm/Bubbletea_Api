<div style="padding: 20px; max-width: 400px; margin: 0 auto;">
  <h1>Registro</h1>

  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
    <div style="margin-bottom: 15px;">
      <label for="email">Email:</label>
      <input 
        type="email" 
        id="email" 
        formControlName="email" 
        style="width: 100%; padding: 8px; margin-top: 5px;"
      />
    </div>

    <div style="margin-bottom: 15px;">
      <label for="password">Password:</label>
      <input 
        type="password" 
        id="password" 
        formControlName="password" 
        style="width: 100%; padding: 8px; margin-top: 5px;"
      />
    </div>

    <div style="margin-bottom: 15px;">
      <label for="confirmPassword">Confirmar Password:</label>
      <input 
        type="password" 
        id="confirmPassword" 
        formControlName="confirmPassword" 
        style="width: 100%; padding: 8px; margin-top: 5px;"
      />
    </div>

    <div *ngIf="registerForm.hasError('passwordMismatch') && registerForm.get('confirmPassword')?.touched" style="color: red; margin-bottom: 15px;">
      Las contraseñas no coinciden
    </div>

    <button type="submit" [disabled]="loading" style="padding: 10px 20px; cursor: pointer;">
      {{ loading ? 'Cargando...' : 'Registrarse' }}
    </button>
  </form>

  <div *ngIf="errorMessage" style="color: red; margin-top: 15px;">
    {{ errorMessage }}
  </div>

  <div style="margin-top: 20px;">
    <button (click)="navigateToLogin()" style="background: none; border: none; color: blue; text-decoration: underline; cursor: pointer;">
      ¿Ya tienes cuenta? Inicia sesión
    </button>
  </div>
</div>
