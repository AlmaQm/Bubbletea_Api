<div style="padding: 20px; max-width: 400px; margin: 0 auto;">
  <h1>Recuperar Contraseña</h1>

  <form [formGroup]="resetForm" (ngSubmit)="onSubmit()">
    <div style="margin-bottom: 15px;">
      <label for="email">Email:</label>
      <input 
        type="email" 
        id="email" 
        formControlName="email" 
        style="width: 100%; padding: 8px; margin-top: 5px;"
      />
    </div>

    <button type="submit" [disabled]="loading" style="padding: 10px 20px; cursor: pointer;">
      {{ loading ? 'Enviando...' : 'Enviar correo de recuperación' }}
    </button>
  </form>

  <div *ngIf="errorMessage" style="color: red; margin-top: 15px;">
    {{ errorMessage }}
  </div>

  <div *ngIf="successMessage" style="color: green; margin-top: 15px;">
    {{ successMessage }}
  </div>

  <div style="margin-top: 20px;">
    <button (click)="navigateToLogin()" style="background: none; border: none; color: blue; text-decoration: underline; cursor: pointer;">
      Volver a Login
    </button>
  </div>
</div>
